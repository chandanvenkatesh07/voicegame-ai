<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Ears -->
  <polygon points="22,28 28,10 36,28" fill="#fb923c"/>
  <polygon points="44,28 52,10 58,28" fill="#fb923c"/>
  <polygon points="24,28 28,14 34,28" fill="#fde68a"/>
  <polygon points="46,28 52,14 56,28" fill="#fde68a"/>
  <!-- Body -->
  <ellipse cx="40" cy="60" rx="20" ry="18" fill="#fb923c"/>
  <!-- Head -->
  <ellipse cx="40" cy="34" rx="20" ry="18" fill="#fb923c"/>
  <!-- Face markings -->
  <ellipse cx="40" cy="38" rx="10" ry="8" fill="#fde68a"/>
  <!-- Eyes -->
  <ellipse cx="33" cy="30" rx="4" ry="5" fill="#22c55e"/>
  <ellipse cx="47" cy="30" rx="4" ry="5" fill="#22c55e"/>
  <ellipse cx="33" cy="30" rx="2" ry="4" fill="#1a1a2e"/>
  <ellipse cx="47" cy="30" rx="2" ry="4" fill="#1a1a2e"/>
  <circle cx="34" cy="28" r="1.2" fill="white"/>
  <circle cx="48" cy="28" r="1.2" fill="white"/>
  <!-- Nose -->
  <polygon points="40,38 37,41 43,41" fill="#f472b6"/>
  <!-- Mouth -->
  <path d="M37,41 Q40,44 43,41" stroke="#c2185b" stroke-width="1.5" fill="none"/>
  <line x1="40" y1="41" x2="40" y2="44" stroke="#c2185b" stroke-width="1.5"/>
  <!-- Whiskers -->
  <line x1="20" y1="37" x2="37" y2="40" stroke="#78350f" stroke-width="1" opacity="0.7"/>
  <line x1="20" y1="41" x2="37" y2="41" stroke="#78350f" stroke-width="1" opacity="0.7"/>
  <line x1="20" y1="45" x2="37" y2="42" stroke="#78350f" stroke-width="1" opacity="0.7"/>
  <line x1="60" y1="37" x2="43" y2="40" stroke="#78350f" stroke-width="1" opacity="0.7"/>
  <line x1="60" y1="41" x2="43" y2="41" stroke="#78350f" stroke-width="1" opacity="0.7"/>
  <line x1="60" y1="45" x2="43" y2="42" stroke="#78350f" stroke-width="1" opacity="0.7"/>
  <!-- Belly -->
  <ellipse cx="40" cy="62" rx="12" ry="10" fill="#fde68a"/>
  <!-- Paws -->
  <ellipse cx="28" cy="76" rx="8" ry="5" fill="#fb923c"/>
  <ellipse cx="52" cy="76" rx="8" ry="5" fill="#fb923c"/>
  <!-- Tail -->
  <path d="M58,64 Q72,58 72,46 Q72,38 66,40" stroke="#fb923c" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="66" cy="40" r="5" fill="#fde68a"/>
</svg>
