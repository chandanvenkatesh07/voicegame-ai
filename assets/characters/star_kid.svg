<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Star body -->
  <polygon points="40,8 47,28 68,28 52,42 58,62 40,50 22,62 28,42 12,28 33,28" fill="#fbbf24"/>
  <!-- Sparkle glow -->
  <polygon points="40,10 46,27 66,27 51,40 57,60 40,48 23,60 29,40 14,27 34,27" fill="#fde68a" opacity="0.5"/>
  <!-- Eyes -->
  <circle cx="34" cy="34" r="3" fill="#1e1b4b"/>
  <circle cx="46" cy="34" r="3" fill="#1e1b4b"/>
  <circle cx="35" cy="33" r="1.2" fill="white"/>
  <circle cx="47" cy="33" r="1.2" fill="white"/>
  <!-- Smile -->
  <path d="M34,40 Q40,46 46,40" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="30" cy="40" r="4" fill="#fb923c" opacity="0.5"/>
  <circle cx="50" cy="40" r="4" fill="#fb923c" opacity="0.5"/>
  <!-- Sparkles around -->
  <circle cx="12" cy="14" r="3" fill="#fde68a" opacity="0.8"/>
  <circle cx="68" cy="14" r="2" fill="#fde68a" opacity="0.8"/>
  <circle cx="8" cy="50" r="2" fill="#fde68a" opacity="0.6"/>
  <circle cx="72" cy="50" r="3" fill="#fde68a" opacity="0.6"/>
  <!-- Tiny sparkle lines -->
  <line x1="12" y1="10" x2="12" y2="18" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="8" y1="14" x2="16" y2="14" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="68" y1="10" x2="68" y2="18" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="64" y1="14" x2="72" y2="14" stroke="#fbbf24" stroke-width="1.5"/>
</svg>
